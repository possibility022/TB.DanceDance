server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Runtime config must never be cached, so env changes take effect on reload.
    location = /config.json {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # SPA: deep links / refresh fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
