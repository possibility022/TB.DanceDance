<header class="block">
  <h1 class="title">My recordings</h1>
  <p class="subtitle">Your private library and shareable links.</p>
</header>

@if (loading()) {
  <progress class="progress is-primary" max="100" aria-label="Loading recordings">Loading…</progress>
} @else if (failed()) {
  <div class="notification is-danger is-light" role="alert">
    <p class="block">We couldn’t load your recordings.</p>
    <button type="button" class="button is-danger" (click)="load()">Try again</button>
  </div>
} @else {
  <div class="block is-flex is-justify-content-flex-end">
    <button type="button" class="button" [class.is-link]="selectMode()" (click)="toggleSelectMode()">
      {{ selectMode() ? 'Cancel selection' : 'Select' }}
    </button>
  </div>

  <app-video-list
    [videos]="items()"
    emptyMessage="You haven’t uploaded any recordings yet."
    [shareable]="!selectMode()"
    [deletable]="!selectMode()"
    [selectable]="selectMode()"
    [selectedIds]="selectedIds()"
    (share)="openShare($event)"
    (deleteVideo)="onDelete($event)"
    (selectionToggle)="toggleSelection($event)"
  />

  @if (canLoadMore()) {
    <div class="block has-text-centered">
      <button
        type="button"
        class="button"
        [class.is-loading]="loadingMore()"
        [disabled]="loadingMore()"
        (click)="loadMore()"
      >
        Load more
      </button>
    </div>
  }
}

@if (selectMode()) {
  <div class="transfer-action-bar" role="region" aria-label="Transfer selection">
    <span>
      <strong>{{ selectedCount() }}</strong> selected · {{ totalSelectedSize() | fileSize }}
    </span>
    <button
      type="button"
      class="button is-primary"
      [disabled]="selectedCount() === 0"
      (click)="openTransfer()"
    >
      Transfer
    </button>
  </div>
}

<app-share-dialog
  [videoId]="shareTarget()?.videoId ?? ''"
  [videoName]="shareTarget()?.name ?? ''"
  [commentVisibility]="shareTarget()?.commentVisibility ?? 0"
  [open]="shareOpen()"
  (closed)="closeShare()"
/>

<app-create-transfer-dialog
  [videos]="selectedVideos()"
  [open]="transferOpen()"
  (closed)="closeTransfer()"
  (created)="onTransferCreated()"
/>
