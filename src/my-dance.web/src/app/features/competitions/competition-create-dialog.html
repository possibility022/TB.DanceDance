<div class="modal" [class.is-active]="open()" role="dialog" aria-modal="true" aria-labelledby="create-competition-title">
  <div class="modal-background" (click)="close()"></div>
  <div class="modal-card">
    <form [formGroup]="form" (ngSubmit)="create()">
      <header class="modal-card-head">
        <p class="modal-card-title" id="create-competition-title">New competition</p>
        <button type="button" class="delete" aria-label="Close dialog" (click)="close()"></button>
      </header>
      <section class="modal-card-body">
        <div class="field">
          <label class="label" for="competition-name">Name</label>
          <div class="control">
            <input id="competition-name" class="input" type="text" formControlName="name" placeholder="e.g. Nationals 2026" />
          </div>
        </div>
        <div class="field">
          <label class="label" for="competition-location">Location (optional)</label>
          <div class="control">
            <input id="competition-location" class="input" type="text" formControlName="location" />
          </div>
        </div>
        <div class="field">
          <label class="label" for="competition-visibility">Who can see comments</label>
          <div class="control">
            <div class="select is-fullwidth">
              <select id="competition-visibility" formControlName="commentVisibility">
                @for (option of visibilityOptions; track option.value) {
                  <option [value]="option.value">{{ option.label }}</option>
                }
              </select>
            </div>
          </div>
        </div>
      </section>
      <footer class="modal-card-foot">
        <button type="button" class="button" (click)="close()">Cancel</button>
        <button type="submit" class="button is-primary ml-1" [class.is-loading]="creating()" [disabled]="form.invalid || creating()">
          Create competition
        </button>
      </footer>
    </form>
  </div>
</div>
