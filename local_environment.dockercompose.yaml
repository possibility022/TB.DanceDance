services:
  api:
    image: tb.dancedance.api:latest
    container_name: tbdancedanceapi
    build:
      dockerfile: /backend/TB.DanceDance.API/Dockerfile
      context: ./src/
      args:
        BUILD_CONFIGURATION: Debug
    depends_on:
      - azuriteStorage
      - postgresDb
      - authserver
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTPS_PORTS=8081
      # TO GENERATE CERT ON YOUR MACHINE and share it with docker image:
      # dotnet dev-certs https --clean
      # dotnet dev-certs https -ep $env:USERPROFILE\.aspnet\https\aspnetapp.pfx -p 2918379123298173918273861
      - ASPNETCORE_Kestrel__Certificates__Default__Password=2918379123298173918273861
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - TB:DanceDance:Cors:Origins=http://localhost:3000/
      # Must equal AuthServer:Issuer — embedded in JWT 'iss' claim and OIDC discovery document.
      - Authentication:Authority=https://localhost:7259/
      - Authentication:Audience=tbdancedanceapi
      # Discovery fetched via host.docker.internal — dev cert validation is bypassed in BackchannelHttpHandler.
      - Authentication:MetadataAddress=https://host.docker.internal:7259/.well-known/openid-configuration
      - ConnectionStrings:PostgreDb=Server=host.docker.internal;Port=5432;Userid=postgres;Password=rgFraWIuyxONqWCQ71wh;Database=dancedance
      - ConnectionStrings:Blob=AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;DefaultEndpointsProtocol=http;BlobEndpoint=http://host.docker.internal:10000/devstoreaccount1;QueueEndpoint=http://host.docker.internal:10001/devstoreaccount1;TableEndpoint=http://host.docker.internal:10002/devstoreaccount1;
    volumes:
      - $USERPROFILE\.aspnet\https\aspnetapp.pfx:/https/aspnetapp.pfx
      - dataProtectionKeys:/home/app/.aspnet/DataProtection-Keys/
      - ./src/backend/TB.DanceDance.API/appsettings.json:/app/appsettings.json
    ports:
      - "7068:8081"
      - "8080:8080"

  authserver:
    image: tb.auth.web:latest
    container_name: tbauthserver
    build:
      dockerfile: authserver/Dockerfile
      context: ./src/
    depends_on:
      - postgresDb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      # Generate this file with: .\tools\generateAuthSigningCert.ps1
      - ./.env.authserver-certs
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTPS_PORTS=8081
      - ASPNETCORE_Kestrel__Certificates__Default__Password=2918379123298173918273861
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings:AuthDbConnectionString=Server=host.docker.internal;Port=5432;Userid=postgres;Password=rgFraWIuyxONqWCQ71wh;Database=tbauthwebdb
      - AuthServer:Issuer=https://localhost:7259/
      - AuthServer:AllowedCorsOrigins:0=http://localhost:3000
    volumes:
      - $USERPROFILE\.aspnet\https\aspnetapp.pfx:/https/aspnetapp.pfx
      - authServerDataProtectionKeys:/home/app/.aspnet/DataProtection-Keys/
    ports:
      - "7259:8081"   # HTTPS - browser auth redirects
      - "5296:8080"   # HTTP - API discovery (avoids cert validation inside Docker)

  postgresDb:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=rgFraWIuyxONqWCQ71wh
    ports:
      - "5432:5432"
    volumes:
      - postgresDance:/var/lib/postgresql

  azuriteStorage:
    image: mcr.microsoft.com/azure-storage/azurite
    volumes:
      - azuriteStorageDance:/data
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"

  frontendspa:
    image: ddfrontend:latest
    container_name: tbdancefrontend
    depends_on:
      - api
    build:
      dockerfile: Dockerfile
      context: src/frontend
    ports:
      - "3000:80"

  converter:
    image: ddconverter:latest
    container_name: tbdanceconverter
    depends_on:
      - api
    build:
      dockerfile: TB.DanceDance.Services.Converter.Deamon/Dockerfile
      context: src/backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - tb.dancedance.converter.oAuthOrigin=http://host.docker.internal:7259/
      - tb.dancedance.converter.apiOrigin=http://host.docker.internal:8080/
      - tb.dancedance.converter.clientSecret=other
      - tb.dancedance.converter.clientId=tbdancedanceconverter
      - tb.dancedance.converter.scope=tbdancedanceapi.convert
      - tb.dancedance.converter.delayInMinutes=1

  initializator:
    image: initializator:latest
    container_name: tbdanceInitializer
    build:
      dockerfile: local_environment.initializator.dockerfile
      context: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - BlobStorageHostName=host.docker.internal
      - DB_HOST=host.docker.internal
      - DB_NAME=dancedance
      - AUTH_DBNAME=tbauthwebdb
    depends_on:
      - postgresDb
      - azuriteStorage

volumes:
  postgresDance:
  azuriteStorageDance:
  dataProtectionKeys:
  authServerDataProtectionKeys:
