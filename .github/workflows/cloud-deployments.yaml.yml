name: Deploy To Cloud
on:
  release:
    types:
      - released
      - prereleased

permissions:
  contents: read

jobs:
  deploy-frontend:
    name: 'Deploy Frontend'
    if: github.event.release.prerelease == false || contains(github.event.release.tag_name, 'beta')
    environment: 'production-azure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: ./src/my-dance.web
        run: npm ci

      - name: Write runtime config
        working-directory: ./src/my-dance.web
        env:
          REACT_APP_API_BASE_URL: ${{ vars.REACT_APP_API_BASE_URL }}
          REACT_APP_AUTH_URL: ${{ vars.REACT_APP_AUTH_URL }}
          REACT_APP_REDIRECT_URI: ${{ vars.REACT_APP_REDIRECT_URI }}
        run: |
          cat > public/config.json <<EOF
          {
            "apiBaseUrl": "${REACT_APP_API_BASE_URL}",
            "authUrl": "${REACT_APP_AUTH_URL}",
            "redirectUri": "${REACT_APP_REDIRECT_URI}"
          }
          EOF
          echo "config.json:" && cat public/config.json

      - name: Build frontend project
        working-directory: ./src/my-dance.web
        run: npm run build

      - name: Deploy Frontend to Azure
        id: deployfrontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_POND_0D634B603 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "src/my-dance.web/dist/my-dance.web/browser"
          api_location: ""
          output_location: ""
          skip_app_build: true